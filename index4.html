<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        .pai {
            background-color: yellowgreen;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .item1 {
            width: 150px;
            height: 150px;
            background-color: blueviolet;
        }
        .item2 {
            width: 150px;
            height: 150px;
            background-color: brown;
        }
        .item3 {
            width: 150px;
            height: 150px;
            background-color: blue;
        }
        .item4 {
            width: 150px;
            height: 150px;
            background-color: cadetblue;
        }
        .item5 {
            width: 150px;
            height: 150px;
            background-color: chocolate;
        }
        .item6 {
            width: 150px;
            height: 150px;
            background-color: chartreuse;
        }
        .item7 {
            width: 150px;
            height: 150px;
            background-color: cornsilk;
        }
        .item8 {
            width: 150px;
            height: 150px;
            background-color: cornflowerblue;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
    </div>
</body>
</html>
